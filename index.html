<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário de Adoção de Cães</title>

</head>

<body>
    
        <nav>

            <h1>Formulário de Adoção de Cães</h1>

        </nav>
        <form id="form">

            <input type="text" id="nome" placeholder="Nome completo" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="telefone" placeholder="Telefone" required>
            <input type="text" id="cpf" placeholder="CPF" required>
            <input type="number" id="idade" placeholder="Idade" required>
            <input type="text" id="cidade" placeholder="Cidade" required>

            <label>Tipo de moradia:</label>
            <select id="moradia" required>
                <option value="">Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>

            <label>Possui quintal?</label>
            <select id="quintal">
                <option value="">Escolha</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

            <label>Já teve pet?</label>
            <select id="pet">
                <option value="">Escolha</option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select>

            <label>Quantas horas sozinho?</label>
            <input type="number" id="horas"><br><br>

            <textarea id="motivo" placeholder="Motivo da adoção" required></textarea>

            <label>
                <input type="checkbox" id="termo"> Aceito o termo de responsabilidade
            </label><br><br>

            <button type="submit">Enviar</button>

        </form>
        <p id="resultado"></p>

        <script src="script.js"></script>
    

</body>

</html>
